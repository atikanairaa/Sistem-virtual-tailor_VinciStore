<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kelola Produk | Vinci Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #5c2b29; --primary-light: #7a3a38; --accent: #d88c8f;
            --bg-admin: #f1f5f9; --white: #ffffff; --text: #1e293b; --border: #e2e8f0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-admin); display: flex; color: var(--text); min-height: 100vh; }
        
        /* Sidebar (Identik dengan dashboard.html) */
        .sidebar { width: 280px; background: var(--primary); color: white; height: 100vh; position: fixed; padding: 40px 20px; display: flex; flex-direction: column; z-index: 100; }
        .logo-admin { display: flex; align-items: center; gap: 12px; font-weight: 800; letter-spacing: 2px; margin-bottom: 50px; font-size: 18px; }
        .nav-item { padding: 14px 18px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.3s; margin-bottom: 8px; color: rgba(255,255,255,0.7); text-decoration: none; }
        .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.1); color: white; }
        .nav-item.active { border-left: 4px solid var(--accent); border-radius: 4px 12px 12px 4px; background: rgba(255,255,255,0.1); font-weight: 700; }
        
        /* Main Content */
        .main { margin-left: 280px; width: calc(100% - 280px); padding: 40px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .top-bar h1 { font-size: 24px; font-weight: 800; color: var(--primary); }

        /* Table Card */
        .content-card { background: var(--white); border-radius: 20px; padding: 30px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid #f1f5f9; color: #64748b; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 15px; border-bottom: 1px solid #f1f5f9; font-size: 14px; vertical-align: middle; }
        
        .product-info-cell { display: flex; align-items: center; gap: 15px; }
        .product-img-mini { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; border: 1px solid var(--border); }
        .badge-spec { background: var(--bg-admin); color: var(--primary); padding: 4px 10px; border-radius: 6px; font-weight: 700; font-size: 12px; border: 1px solid #e2e8f0; }

        /* Buttons */
        .btn-add { background: var(--primary); color: white; padding: 12px 24px; border-radius: 12px; font-weight: 700; border: none; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-add:hover { background: var(--primary-light); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(92, 43, 41, 0.2); }
        .action-btns { display: flex; gap: 8px; }
        .btn-icon { width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; border: 1px solid var(--border); background: white; }
        .btn-edit:hover { background: #eff6ff; color: #2563eb; border-color: #bfdbfe; }
        .btn-delete:hover { background: #fef2f2; color: #dc2626; border-color: #fecaca; }

        /* Modal CRUD */
        .modal { display:none; position:fixed; inset:0; background:rgba(30, 41, 59, 0.7); backdrop-filter: blur(4px); z-index: 2000; align-items:center; justify-content:center; }
        .modal-card { background:white; padding:35px; border-radius:24px; width:550px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); animation: modalIn 0.3s ease-out; }
        @keyframes modalIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group-admin { margin-bottom: 20px; }
        .form-group-admin label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #64748b; }
        .form-group-admin input, .form-group-admin textarea { width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 10px; font-family: inherit; transition: 0.2s; }
        .form-group-admin input:focus { border-color: var(--accent); outline: none; background: #fffafa; }
        .btn-save { background: var(--primary); color:white; border:none; padding: 14px; width:100%; border-radius: 12px; font-weight: 700; cursor:pointer; font-size: 15px; transition: 0.3s; margin-top: 10px; }
        .btn-save:hover { background: var(--primary-light); }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo-admin">
            <img src="/static/logo.png" width="35" style="border-radius: 50%;"> 
            VINCI ADMIN
        </div>
        <nav class="nav-admin">
            <a href="/admin/dashboard" class="nav-item"><i class="fas fa-chart-pie"></i> Ringkasan</a>
            <a href="/admin/products" class="nav-item active"><i class="fas fa-box"></i> Kelola Produk</a>
            <a href="/" target="_blank" class="nav-item"><i class="fas fa-eye"></i> Lihat Toko</a>
        </nav>
        <div class="nav-item" style="margin-top: auto;" onclick="handleLogout()">
            <i class="fas fa-sign-out-alt"></i> Keluar
        </div>
    </aside>

    <main class="main">
        <div class="top-bar">
            <h1>Manajemen Katalog Produk</h1>
            <button class="btn-add" onclick="openModal()">
                <i class="fas fa-plus"></i> Tambah Produk
            </button>
        </div>

        <div class="content-card">
            <table id="productTable">
                <thead>
                    <tr>
                        <th>Produk</th>
                        <th>Harga</th>
                        <th>Ukuran (LD/PJ)</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody><!-- Data via JS --></tbody>
            </table>
        </div>
    </main>

    <!-- MODAL CRUD -->
    <div id="pModal" class="modal">
        <div class="modal-card">
            <h2 id="modalTitle" style="margin-bottom: 25px; color: var(--primary);">Tambah Produk</h2>
            <form id="pForm">
                <input type="hidden" id="pId">
                <div class="form-group-admin"><label>Nama Produk</label><input type="text" id="pName" required placeholder="Contoh: NUNA SHIRT Vol 1"></div>
                <div class="form-grid">
                    <div class="form-group-admin"><label>Harga (IDR)</label><input type="number" id="pPrice" required placeholder="215000"></div>
                    <div class="form-group-admin"><label>URL Gambar</label><input type="text" id="pImg" required placeholder="https://..."></div>
                </div>
                <div class="form-grid">
                    <div class="form-group-admin"><label>Lingkar Dada (cm)</label><input type="number" id="pLd" required placeholder="110"></div>
                    <div class="form-group-admin"><label>Panjang Baju (cm)</label><input type="number" id="pPj" required placeholder="75"></div>
                </div>
                <div class="form-group-admin"><label>Deskripsi</label><textarea id="pDesc" rows="3" placeholder="Detail bahan, fitur, dll"></textarea></div>
                
                <button type="submit" class="btn-save">Simpan Perubahan</button>
                <button type="button" onclick="closeModal()" style="width:100%; background:none; border:none; margin-top:15px; color:#64748b; font-weight:600; cursor:pointer;">Batalkan</button>
            </form>
        </div>
    </div>

    <script>
        // Modal Logic
        function openModal(data = null) {
            document.getElementById('pModal').style.display = 'flex';
            if(data) {
                document.getElementById('modalTitle').innerText = "Edit Produk";
                document.getElementById('pId').value = data.id;
                document.getElementById('pName').value = data.name;
                document.getElementById('pPrice').value = data.price;
                document.getElementById('pImg').value = data.image_url;
                document.getElementById('pDesc').value = data.description;
                // Ambil data size chart (perhatikan nama property dari API baru)
                document.getElementById('pLd').value = data.ld || (data.size_charts?.[0]?.ld_produk) || '';
                document.getElementById('pPj').value = data.panjang || (data.size_charts?.[0]?.panjang_produk) || '';
            } else {
                document.getElementById('pForm').reset();
                document.getElementById('pId').value = "";
                document.getElementById('modalTitle').innerText = "Tambah Produk Baru";
            }
        }
        function closeModal() { document.getElementById('pModal').style.display = 'none'; }

        // Fetch List
        async function loadProducts() {
            try {
                const res = await fetch('/api/v1/products?t=' + Date.now());
                const data = await res.json();
                const tbody = document.querySelector('#productTable tbody');
                
                if (data.products && data.products.length > 0) {
                    tbody.innerHTML = data.products.map(p => `
                        <tr>
                            <td>
                                <div class="product-info-cell">
                                    <img src="${p.image_url}" class="product-img-mini">
                                    <strong>${p.name}</strong>
                                </div>
                            </td>
                            <td><span style="font-weight:700">Rp ${p.price.toLocaleString('id-ID')}</span></td>
                            <td>
                                <span class="badge-spec">LD: ${p.ld}</span>
                                <span class="badge-spec">PJ: ${p.panjang}</span>
                            </td>
                            <td>
                                <div class="action-btns">
                                    <div class="btn-icon btn-edit" onclick="editProduct(${p.id})" title="Edit"><i class="fas fa-edit"></i></div>
                                    <div class="btn-icon btn-delete" onclick="deleteProduct(${p.id})" title="Hapus"><i class="fas fa-trash"></i></div>
                                </div>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:40px;">Belum ada produk.</td></tr>';
                }
            } catch (e) { console.error("Load error:", e); }
        }

        async function editProduct(id) {
            const res = await fetch(`/api/v1/products/${id}`);
            const data = await res.json();
            openModal(data.product);
        }

        document.getElementById('pForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('pId').value;
            const payload = {
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                image_url: document.getElementById('pImg').value,
                description: document.getElementById('pDesc').value,
                ld: document.getElementById('pLd').value,
                panjang: document.getElementById('pPj').value
            };
            
            const url = id ? `/api/v1/admin/products/update/${id}` : `/api/v1/admin/products/add`;
            const method = id ? 'PUT' : 'POST';

            const res = await fetch(url, {
                method, headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload), credentials: 'same-origin'
            });
            if(res.ok) { 
                closeModal();
                loadProducts();
                alert("Perubahan berhasil disimpan!");
            }
        };

        async function deleteProduct(id) {
            if(confirm('Apakah Anda yakin ingin menghapus produk ini secara permanen?')) {
                const res = await fetch(`/api/v1/admin/products/delete/${id}`, { method: 'DELETE', credentials: 'same-origin' });
                if(res.ok) loadProducts();
            }
        }

        async function handleLogout() {
            if (confirm("Keluar dari sistem admin?")) {
                await fetch('/api/v1/auth/logout', { method: 'POST', credentials: 'same-origin' });
                window.location.href = '/login';
            }
        }

        window.onload = loadProducts;
    </script>
</body>
</html>
